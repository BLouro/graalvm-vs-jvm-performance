spring.application.name=spring-boot-jvm
server.port=${SERVER_PORT:8080}

## PostgresSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/demodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:demo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:demo}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10

management.metrics.tags.application=${spring.application.name}
management.endpoints.web.exposure.include=health,prometheus
